services:
  db:
    image: postgres:16
    container_name: bandival-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bandival
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d bandival"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  web:
    image: ${BANDIVAL_IMAGE:-ghcr.io/f0up/bandival-web}:${BANDIVAL_TAG:-latest}
    pull_policy: always
    container_name: bandival-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/bandival?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-https://bandival.example.com}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      PORT: ${APP_PORT:-3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - uploads_data:/app/public/uploads
      - exports_data:/app/public/exports
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  db_data:
    name: bandival_db_data
  uploads_data:
    name: bandival_uploads_data
  exports_data:
    name: bandival_exports_data
